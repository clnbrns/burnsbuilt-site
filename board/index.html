<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<title>Board · Colin</title>
<meta name="theme-color" content="#0E1A2E" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" />
<style>
/* ============================================================
 * Colin's Board — single-file personal Kanban
 * State: localStorage key "bb-board-v1"
 * No network calls. Works offline once loaded.
 * ============================================================ */

:root {
  --bg:        #0E1A2E;
  --surface:   #142640;
  --surface-2: #1E3A5F;
  --col-bg:    rgba(20, 38, 64, 0.55);
  --line:      rgba(255,255,255,0.08);
  --line-2:    rgba(255,255,255,0.14);
  --text:      #F5ECE0;
  --text-dim:  #8a94a8;
  --text-mute: #5a6478;
  --accent:    #c49a62;
  --danger:    #d54848;
  --success:   #3a7a55;
  --radius:    6px;
  --radius-lg: 10px;
  --font:      'Inter', system-ui, sans-serif;
  --mono:      'JetBrains Mono', ui-monospace, monospace;
  --shadow:    0 4px 16px rgba(0,0,0,0.25);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.45);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font);
  background:
    radial-gradient(80% 60% at 80% 0%, rgba(196,154,98,0.05) 0%, transparent 60%),
    radial-gradient(80% 60% at 10% 100%, rgba(91,141,239,0.04) 0%, transparent 60%),
    var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow: hidden; /* board scrolls horizontally; modal overlays handle their own */
  display: flex; flex-direction: column;
  min-height: 100dvh;
}
button { font: inherit; cursor: pointer; }
input, select, textarea {
  font: inherit; font-size: 16px; /* prevent iOS zoom */
  border: 1px solid var(--line-2);
  background: var(--surface);
  color: var(--text);
  padding: 10px 12px; border-radius: var(--radius);
  outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }

/* ───── HEADER ───── */
header.top {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  padding-top: max(10px, env(safe-area-inset-top));
  border-bottom: 1px solid var(--line);
  background: rgba(14,26,46,0.85);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
header h1 {
  font-size: 18px; font-weight: 800; letter-spacing: -0.01em;
  margin: 0; color: var(--text);
}
header h1 .accent { color: var(--accent); }
.header-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.header-actions input[type="search"] { width: 220px; padding: 8px 12px; }
.icon-btn {
  background: transparent; border: 1px solid var(--line-2); color: var(--text);
  width: 36px; height: 36px; border-radius: var(--radius);
  display: inline-flex; align-items: center; justify-content: center;
  transition: background .12s, border-color .12s;
  font-size: 16px;
}
.icon-btn:hover { background: var(--surface); border-color: var(--accent); }
@media (max-width: 720px) {
  .header-actions input[type="search"] { width: 130px; padding: 8px 10px; font-size: 14px; }
  header h1 .full { display: none; }
}

/* ───── FILTERS ───── */
.filters {
  display: flex; gap: 6px; align-items: center; overflow-x: auto;
  padding: 10px 16px; border-bottom: 1px solid var(--line);
  scrollbar-width: thin;
}
.filters::-webkit-scrollbar { height: 4px; }
.filters::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 2px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  background: var(--surface); border: 1px solid var(--line-2);
  font-size: 12.5px; font-weight: 600; color: var(--text-dim);
  white-space: nowrap; cursor: pointer; user-select: none;
  transition: all .12s;
}
.chip:hover { color: var(--text); border-color: var(--accent); }
.chip.on { background: var(--surface-2); border-color: var(--accent); color: var(--text); }
.chip .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-dim); }
.chip .count { font-family: var(--mono); font-size: 10.5px; color: var(--text-mute); }

/* ───── QUICK ADD ───── */
.quick-add {
  display: flex; gap: 8px; padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  background: rgba(20,38,64,0.4);
}
.quick-add input[type="text"] { flex: 1; }
.quick-add select { min-width: 130px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 16px; border-radius: var(--radius);
  border: 0; background: var(--accent); color: #0E1A2E;
  font-weight: 700; font-size: 14px;
  transition: filter .12s, transform .08s;
}
.btn:hover { filter: brightness(1.1); }
.btn:active { transform: translateY(1px); }
.btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--line-2); }
.btn-ghost:hover { background: var(--surface); }
.btn-danger { background: var(--danger); color: #fff; }
@media (max-width: 540px) {
  .quick-add { flex-wrap: wrap; }
  .quick-add input[type="text"] { flex: 1 1 100%; }
  .quick-add select { flex: 1; min-width: 0; }
  .quick-add .btn { flex: 0 0 auto; }
}

/* ───── BOARD ───── */
.board {
  flex: 1; min-height: 0;
  display: grid; gap: 14px;
  grid-template-columns: repeat(4, minmax(280px, 1fr));
  padding: 16px;
  overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
}
@media (max-width: 1024px) {
  .board { grid-template-columns: repeat(4, 280px); }
}
.column {
  background: var(--col-bg);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  display: flex; flex-direction: column; min-height: 0;
}
.column.drop-target { border-color: var(--accent); background: rgba(196,154,98,0.05); }
.col-head {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-bottom: 1px solid var(--line);
  font-weight: 700; font-size: 14px;
}
.col-head .count {
  margin-left: auto;
  font-family: var(--mono); font-size: 11px; color: var(--text-mute);
  background: var(--surface); padding: 2px 8px; border-radius: 999px;
}
.col-body {
  flex: 1; overflow-y: auto; padding: 8px;
  scrollbar-width: thin;
}
.col-body::-webkit-scrollbar { width: 4px; }
.col-body::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 2px; }
.col-empty {
  color: var(--text-mute); font-size: 12.5px; text-align: center;
  padding: 24px 12px; line-height: 1.5;
}

/* ───── CARD ───── */
.card {
  background: var(--surface);
  border-left: 3px solid var(--cat-color, var(--accent));
  border-radius: var(--radius);
  padding: 10px 12px; margin-bottom: 8px;
  cursor: grab; user-select: none;
  position: relative;
  transition: transform .08s, box-shadow .12s, opacity .12s;
}
.card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.card.dragging { opacity: 0.4; cursor: grabbing; }
.card .cat {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--cat-color, var(--accent));
  margin-bottom: 4px;
}
.card .title {
  font-size: 14px; font-weight: 500; line-height: 1.35;
  color: var(--text); margin: 0;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.card .meta {
  margin-top: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  font-size: 11px; color: var(--text-mute); font-family: var(--mono);
}
.card .meta .due { padding: 2px 6px; border-radius: 3px; background: rgba(255,255,255,0.05); }
.card .meta .due.soon { background: rgba(196,154,98,0.15); color: var(--accent); }
.card .meta .due.late { background: rgba(213,72,72,0.15); color: var(--danger); }
.card .meta .aged { color: var(--text-mute); font-style: italic; }
.card .move-mobile {
  display: none;
  position: absolute; top: 6px; right: 6px;
  background: transparent; border: 0; color: var(--text-mute);
  width: 24px; height: 24px; border-radius: 4px; font-size: 16px;
}
@media (hover: none) {
  .card { cursor: pointer; }
  .card .move-mobile { display: flex; align-items: center; justify-content: center; }
  .card .move-mobile:hover { background: var(--surface-2); color: var(--text); }
}

/* ───── MODAL ───── */
.modal-bg {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center;
  padding: 16px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
}
.modal-bg.open { display: flex; }
.modal {
  width: 100%; max-width: 520px;
  background: var(--surface); border: 1px solid var(--line-2); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column;
  max-height: 92dvh; max-height: 92vh;
  overflow: hidden;
}
.modal header {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 14px 18px; border-bottom: 1px solid var(--line);
}
.modal header h3 { margin: 0; font-size: 16px; font-weight: 700; }
.modal-body { padding: 18px; overflow-y: auto; }
.modal-body label {
  display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-mute); margin: 0 0 6px;
}
.modal-body .field { margin-bottom: 16px; }
.modal-body input, .modal-body select, .modal-body textarea { width: 100%; }
.modal-body textarea { min-height: 96px; resize: vertical; }
.modal footer {
  display: flex; gap: 8px; padding: 14px 18px; border-top: 1px solid var(--line);
  flex-wrap: wrap;
}
.modal footer .btn { flex: 1; min-width: 0; }
.modal footer .btn-danger { flex: 0 0 auto; }

/* ───── TOAST ───── */
.toast {
  position: fixed; bottom: max(20px, env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--accent);
  border-radius: 999px; padding: 10px 18px;
  font-size: 13px; font-weight: 600; z-index: 200;
  box-shadow: var(--shadow);
  opacity: 0; transition: opacity .2s, transform .2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translate(-50%, -4px); }

/* ───── SETTINGS / CATEGORIES MODAL ───── */
.cat-row {
  display: grid; grid-template-columns: 24px 1fr 80px 32px 32px; gap: 8px; align-items: center;
  padding: 6px 0; border-bottom: 1px solid var(--line);
}
.cat-row input[type="text"] { padding: 6px 8px; }
.cat-row input[type="color"] {
  width: 32px; height: 32px; padding: 0; border: 1px solid var(--line-2); border-radius: 4px;
  background: transparent;
}
.cat-emoji { font-size: 18px; text-align: center; }
.cat-row .icon-btn { width: 32px; height: 32px; font-size: 14px; }

/* keyboard hint */
.kbd {
  font-family: var(--mono); font-size: 10.5px;
  background: var(--surface); border: 1px solid var(--line-2);
  padding: 2px 6px; border-radius: 4px; color: var(--text-mute);
}

/* Small helper line under header on mobile */
.hint-bar { display: none; }
@media (max-width: 720px) {
  header h1 { font-size: 16px; }
  .header-actions .icon-btn { width: 32px; height: 32px; font-size: 14px; }
}

/* Stage select for mobile move menu */
.stage-pick {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  padding: 8px;
}
.stage-pick button {
  padding: 14px 10px;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--line-2); border-radius: var(--radius);
  text-align: left; font-weight: 600;
}
.stage-pick button:hover { border-color: var(--accent); }
.stage-pick button.current { opacity: 0.5; cursor: default; }
</style>
</head>
<body>

<header class="top">
  <h1><span class="full">Colin's </span>Board<span class="accent">.</span></h1>
  <div class="header-actions">
    <input type="search" id="search" placeholder="Search…" aria-label="Search cards"/>
    <button class="icon-btn" id="export-btn" title="Export JSON">⬇</button>
    <button class="icon-btn" id="import-btn" title="Import JSON">⬆</button>
    <button class="icon-btn" id="settings-btn" title="Categories">⚙</button>
  </div>
</header>

<div class="filters" id="filters">
  <!-- chips rendered by JS -->
</div>

<form class="quick-add" id="quick-add">
  <input type="text" id="quick-title" placeholder="Add a task — press Enter…" autocomplete="off"/>
  <select id="quick-cat" aria-label="Category">
    <!-- options rendered by JS -->
  </select>
  <button type="submit" class="btn">+ Add</button>
</form>

<main class="board" id="board">
  <!-- columns rendered by JS -->
</main>

<!-- EDIT MODAL -->
<div class="modal-bg" id="edit-bg" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="edit-title">
    <header>
      <h3 id="edit-title">Edit Task</h3>
      <button class="icon-btn" type="button" id="edit-close" aria-label="Close">✕</button>
    </header>
    <div class="modal-body">
      <div class="field">
        <label for="ed-title">Title</label>
        <input type="text" id="ed-title" autocomplete="off"/>
      </div>
      <div class="field">
        <label for="ed-desc">Notes</label>
        <textarea id="ed-desc" placeholder="Optional notes, links, sub-steps…"></textarea>
      </div>
      <div class="field">
        <label for="ed-cat">Category</label>
        <select id="ed-cat"></select>
      </div>
      <div class="field">
        <label for="ed-due">Due date</label>
        <input type="date" id="ed-due"/>
      </div>
      <div class="field">
        <label>Move to</label>
        <div class="stage-pick" id="ed-stages"></div>
      </div>
    </div>
    <footer>
      <button class="btn" type="button" id="ed-save">Save</button>
      <button class="btn btn-danger" type="button" id="ed-delete" title="Delete">🗑</button>
    </footer>
  </div>
</div>

<!-- SETTINGS / CATEGORIES MODAL -->
<div class="modal-bg" id="set-bg" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true">
    <header>
      <h3>Categories</h3>
      <button class="icon-btn" type="button" id="set-close" aria-label="Close">✕</button>
    </header>
    <div class="modal-body">
      <div id="cat-list"></div>
      <button class="btn btn-ghost" type="button" id="cat-add" style="margin-top:14px;width:100%;">+ Add category</button>
      <p style="margin-top:18px; color: var(--text-mute); font-size: 12px; line-height: 1.6;">
        Tip: keyboard <span class="kbd">N</span> new task · <span class="kbd">/</span> search · <span class="kbd">Esc</span> close.<br/>
        All data lives in your browser (localStorage). Use ⬇ to back up.
      </p>
    </div>
    <footer>
      <button class="btn" type="button" id="set-save">Done</button>
    </footer>
  </div>
</div>

<input type="file" id="import-file" accept=".json,application/json" style="display:none"/>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
 * STATE
 * ============================================================ */
const STORAGE_KEY = "bb-board-v1";
const STAGES = [
  { id: "inbox", label: "📥 Inbox" },
  { id: "week",  label: "📅 This Week" },
  { id: "today", label: "🔥 Today" },
  { id: "done",  label: "✅ Done" },
];
const DEFAULT_CATEGORIES = [
  { id: "job",      label: "Day Job",        color: "#5b8def", icon: "🏢" },
  { id: "turf",     label: "Bearcat Turf",   color: "#3a7a55", icon: "🌱" },
  { id: "dugout",   label: "DugoutData",     color: "#d54848", icon: "⚾" },
  { id: "bb",       label: "BurnsBuilt",     color: "#c49a62", icon: "🔨" },
  { id: "msm",      label: "MSM",            color: "#0a5fb7", icon: "🏆" },
  { id: "personal", label: "Personal",       color: "#9c6dd6", icon: "👤" },
  { id: "money",    label: "Financial",      color: "#1e8d83", icon: "💰" },
];

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function uid() { return "c-" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4); }

let state = loadState() || {
  version: 1,
  categories: DEFAULT_CATEGORIES,
  cards: [],
  filter: null,    // category id or null
  search: "",
};
// migration: ensure required fields exist
if (!state.categories) state.categories = DEFAULT_CATEGORIES;
if (!state.cards) state.cards = [];

let editingId = null;

/* ============================================================
 * HELPERS
 * ============================================================ */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));

function cat(id) { return state.categories.find(c => c.id === id) || { label: "Uncategorized", color: "#8a94a8", icon: "•" }; }
function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}
function todayStr() { return new Date().toISOString().slice(0,10); }
function daysFrom(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d - now) / (1000*60*60*24));
}
function ageDays(iso) {
  if (!iso) return 0;
  return Math.round((Date.now() - new Date(iso).getTime()) / (1000*60*60*24));
}

function toast(msg) {
  const el = $("#toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), 1600);
}

/* ============================================================
 * RENDER
 * ============================================================ */
function render() {
  renderFilters();
  renderQuickCat();
  renderBoard();
}

function renderFilters() {
  const wrap = $("#filters");
  const counts = state.categories.reduce((acc, c) => (acc[c.id] = 0, acc), {});
  state.cards.forEach(c => { if (counts[c.catId] != null) counts[c.catId]++; });

  wrap.innerHTML = "";

  const allChip = chipEl({ id: "all", label: "All", color: "#8a94a8", icon: "✦" }, state.cards.length, state.filter == null);
  allChip.onclick = () => { state.filter = null; saveState(); render(); };
  wrap.appendChild(allChip);

  state.categories.forEach(c => {
    const el = chipEl(c, counts[c.id] || 0, state.filter === c.id);
    el.onclick = () => { state.filter = state.filter === c.id ? null : c.id; saveState(); render(); };
    wrap.appendChild(el);
  });
}
function chipEl(c, count, on) {
  const el = document.createElement("button");
  el.type = "button";
  el.className = "chip" + (on ? " on" : "");
  el.innerHTML = `<span class="dot" style="background:${c.color}"></span>${c.icon || ""} ${escapeHtml(c.label)} <span class="count">${count}</span>`;
  return el;
}

function renderQuickCat() {
  const sel = $("#quick-cat");
  sel.innerHTML = state.categories.map(c =>
    `<option value="${c.id}">${c.icon || ""} ${escapeHtml(c.label)}</option>`
  ).join("");
}

function renderBoard() {
  const board = $("#board");
  const q = state.search.trim().toLowerCase();
  board.innerHTML = "";
  STAGES.forEach(s => {
    const col = document.createElement("section");
    col.className = "column"; col.dataset.stage = s.id;
    const cards = state.cards.filter(c =>
      c.stage === s.id &&
      (state.filter == null || c.catId === state.filter) &&
      (q === "" || (c.title + " " + (c.desc || "")).toLowerCase().includes(q))
    );
    col.innerHTML = `
      <div class="col-head">${s.label} <span class="count">${cards.length}</span></div>
      <div class="col-body"></div>`;
    const body = col.querySelector(".col-body");
    if (!cards.length) {
      body.innerHTML = `<div class="col-empty">${s.id === "done" ? "Crush it." : "Nothing here."}</div>`;
    } else {
      cards.forEach(c => body.appendChild(renderCard(c)));
    }
    // drop target
    col.addEventListener("dragover", (e) => { e.preventDefault(); col.classList.add("drop-target"); });
    col.addEventListener("dragleave", () => col.classList.remove("drop-target"));
    col.addEventListener("drop", (e) => {
      e.preventDefault(); col.classList.remove("drop-target");
      const id = e.dataTransfer.getData("text/plain");
      const card = state.cards.find(x => x.id === id);
      if (card && card.stage !== s.id) {
        card.stage = s.id;
        saveState(); render();
      }
    });
    board.appendChild(col);
  });
}

function renderCard(c) {
  const cc = cat(c.catId);
  const el = document.createElement("article");
  el.className = "card";
  el.draggable = true;
  el.dataset.id = c.id;
  el.style.setProperty("--cat-color", cc.color);

  const due = c.due ? daysFrom(c.due) : null;
  let dueLabel = "";
  if (c.due) {
    const cls = due < 0 ? "late" : due <= 2 ? "soon" : "";
    const fmt = due === 0 ? "today" :
                due === 1 ? "tomorrow" :
                due < 0 ? `${-due}d late` :
                due <= 7 ? `${due}d` :
                new Date(c.due + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric" });
    dueLabel = `<span class="due ${cls}">📅 ${fmt}</span>`;
  }
  const age = ageDays(c.createdAt);
  const ageLabel = (age >= 7 && c.stage !== "done") ? `<span class="aged">aged ${age}d</span>` : "";

  el.innerHTML = `
    <div class="cat">${cc.icon || ""} ${escapeHtml(cc.label)}</div>
    <p class="title">${escapeHtml(c.title)}</p>
    <div class="meta">${dueLabel}${ageLabel}</div>
    <button class="move-mobile" type="button" aria-label="Move">⋯</button>
  `;
  el.addEventListener("click", (e) => {
    if (e.target.closest(".move-mobile")) return;
    openEditModal(c.id);
  });
  el.querySelector(".move-mobile").addEventListener("click", (e) => {
    e.stopPropagation();
    openEditModal(c.id, true); // scroll to stage picker on mobile
  });
  // drag
  el.addEventListener("dragstart", (e) => {
    el.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", c.id);
  });
  el.addEventListener("dragend", () => el.classList.remove("dragging"));
  return el;
}

/* ============================================================
 * QUICK ADD
 * ============================================================ */
$("#quick-add").addEventListener("submit", (e) => {
  e.preventDefault();
  const title = $("#quick-title").value.trim();
  if (!title) return;
  const catId = $("#quick-cat").value;
  state.cards.unshift({
    id: uid(),
    title,
    desc: "",
    catId,
    stage: "inbox",
    due: null,
    createdAt: new Date().toISOString(),
  });
  $("#quick-title").value = "";
  saveState(); render();
  toast("Added to Inbox");
});

/* ============================================================
 * SEARCH
 * ============================================================ */
$("#search").addEventListener("input", (e) => {
  state.search = e.target.value;
  renderBoard();
});

/* ============================================================
 * EDIT MODAL
 * ============================================================ */
function openEditModal(id, focusStages) {
  editingId = id;
  const c = state.cards.find(x => x.id === id);
  if (!c) return;
  $("#ed-title").value = c.title;
  $("#ed-desc").value = c.desc || "";
  $("#ed-cat").innerHTML = state.categories.map(x =>
    `<option value="${x.id}" ${x.id === c.catId ? "selected" : ""}>${x.icon || ""} ${escapeHtml(x.label)}</option>`
  ).join("");
  $("#ed-due").value = c.due || "";
  $("#ed-stages").innerHTML = STAGES.map(s =>
    `<button type="button" data-stage="${s.id}" class="${s.id === c.stage ? "current" : ""}">${s.label}</button>`
  ).join("");
  $("#ed-stages").querySelectorAll("button").forEach(b => {
    b.addEventListener("click", () => {
      if (b.classList.contains("current")) return;
      const card = state.cards.find(x => x.id === editingId);
      card.stage = b.dataset.stage;
      saveState(); render();
      closeEditModal();
      toast("Moved");
    });
  });
  $("#edit-bg").classList.add("open");
  $("#edit-bg").setAttribute("aria-hidden", "false");
  if (focusStages) {
    setTimeout(() => $("#ed-stages").scrollIntoView({ behavior: "smooth", block: "center" }), 100);
  } else {
    setTimeout(() => $("#ed-title").focus(), 100);
  }
}
function closeEditModal() {
  $("#edit-bg").classList.remove("open");
  $("#edit-bg").setAttribute("aria-hidden", "true");
  editingId = null;
}
$("#edit-close").addEventListener("click", closeEditModal);
$("#edit-bg").addEventListener("click", (e) => { if (e.target.id === "edit-bg") closeEditModal(); });

$("#ed-save").addEventListener("click", () => {
  if (!editingId) return;
  const c = state.cards.find(x => x.id === editingId);
  c.title = $("#ed-title").value.trim() || c.title;
  c.desc = $("#ed-desc").value.trim();
  c.catId = $("#ed-cat").value;
  c.due = $("#ed-due").value || null;
  saveState(); render(); closeEditModal(); toast("Saved");
});
$("#ed-delete").addEventListener("click", () => {
  if (!editingId) return;
  if (!confirm("Delete this task?")) return;
  state.cards = state.cards.filter(x => x.id !== editingId);
  saveState(); render(); closeEditModal(); toast("Deleted");
});

/* ============================================================
 * SETTINGS / CATEGORIES
 * ============================================================ */
$("#settings-btn").addEventListener("click", openSettings);
$("#set-close").addEventListener("click", closeSettings);
$("#set-save").addEventListener("click", () => { saveCatEdits(); closeSettings(); toast("Saved"); });
$("#cat-add").addEventListener("click", () => {
  const list = $("#cat-list");
  const row = catRowEl({ id: uid(), label: "New", color: "#888888", icon: "•" });
  list.appendChild(row);
});
$("#set-bg").addEventListener("click", (e) => { if (e.target.id === "set-bg") closeSettings(); });

function openSettings() {
  const list = $("#cat-list");
  list.innerHTML = "";
  state.categories.forEach(c => list.appendChild(catRowEl(c)));
  $("#set-bg").classList.add("open");
  $("#set-bg").setAttribute("aria-hidden", "false");
}
function closeSettings() {
  $("#set-bg").classList.remove("open");
  $("#set-bg").setAttribute("aria-hidden", "true");
}
function catRowEl(c) {
  const row = document.createElement("div");
  row.className = "cat-row";
  row.dataset.id = c.id;
  row.innerHTML = `
    <input type="text" class="cat-emoji" maxlength="2" value="${escapeHtml(c.icon || "")}" aria-label="Icon"/>
    <input type="text" class="cat-label" value="${escapeHtml(c.label)}" aria-label="Label"/>
    <input type="color" class="cat-color" value="${c.color}"/>
    <span></span>
    <button type="button" class="icon-btn" title="Remove" aria-label="Remove">✕</button>
  `;
  row.querySelector('button[title="Remove"]').addEventListener("click", () => {
    if (!confirm(`Remove "${c.label}"? Tasks with this category will keep working but stay tagged with it.`)) return;
    row.remove();
  });
  return row;
}
function saveCatEdits() {
  const rows = $$("#cat-list .cat-row");
  state.categories = rows.map(r => ({
    id: r.dataset.id,
    icon: r.querySelector(".cat-emoji").value.trim() || "•",
    label: r.querySelector(".cat-label").value.trim() || "Untitled",
    color: r.querySelector(".cat-color").value || "#888",
  }));
  saveState(); render();
}

/* ============================================================
 * EXPORT / IMPORT
 * ============================================================ */
$("#export-btn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `board-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast("Exported");
});
$("#import-btn").addEventListener("click", () => $("#import-file").click());
$("#import-file").addEventListener("change", async (e) => {
  const f = e.target.files?.[0]; if (!f) return;
  try {
    const text = await f.text();
    const obj = JSON.parse(text);
    if (!obj.cards || !obj.categories) throw new Error("not a board file");
    if (!confirm("Replace your current board with the imported file?")) return;
    state = { ...obj, filter: null, search: "" };
    saveState(); render();
    toast("Imported");
  } catch (err) {
    alert("Could not import: " + err.message);
  } finally {
    e.target.value = "";
  }
});

/* ============================================================
 * KEYBOARD SHORTCUTS
 * ============================================================ */
document.addEventListener("keydown", (e) => {
  const inField = ["INPUT","TEXTAREA","SELECT"].includes(document.activeElement?.tagName);
  if (e.key === "Escape") {
    closeEditModal(); closeSettings();
    return;
  }
  if (inField) return;
  if (e.key === "n" || e.key === "N") {
    e.preventDefault(); $("#quick-title").focus();
  } else if (e.key === "/") {
    e.preventDefault(); $("#search").focus();
  }
});

/* ============================================================
 * INITIAL RENDER
 * ============================================================ */
render();

// Welcome seed if board is empty AND no localStorage existed before
if (state.cards.length === 0 && !localStorage.getItem(STORAGE_KEY + "-seen")) {
  const seedNow = new Date().toISOString();
  state.cards.push(
    { id: uid(), title: "Drag me to Today", desc: "Cards drag between columns. Tap to edit. Filter chips at the top.", catId: "personal", stage: "inbox", due: null, createdAt: seedNow },
    { id: uid(), title: "Add your own task — press N", desc: "Or just type up top and hit Enter.", catId: "personal", stage: "inbox", due: null, createdAt: seedNow },
    { id: uid(), title: "Customize categories", desc: "Click the ⚙ gear in the top right. Add colors, emoji, labels.", catId: "personal", stage: "inbox", due: null, createdAt: seedNow },
  );
  localStorage.setItem(STORAGE_KEY + "-seen", "1");
  saveState();
  render();
}
</script>
</body>
</html>
