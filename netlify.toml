# Netlify configuration for BurnsBuilt.co
# Static site + Netlify Functions for AI Lead Qualifier.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  # Bundler for AI functions (Gemini called via fetch)
  node_bundler = "esbuild"
  # External dependencies are resolved from package.json node_modules at runtime.
  # @netlify/blobs is intentionally bundled inline (not external) so Netlify's
  # static analysis detects the import and injects NETLIFY_BLOBS_CONTEXT — the
  # env var that lets getStore() auto-configure without explicit siteID/token.
  external_node_modules = ["twilio", "nodemailer"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # Stronger HSTS — 2 years + preload-ready, protects all *.burnsbuilt.co subdomains
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Content Security Policy. 'unsafe-inline' is unavoidable for inline GA/gtag and
    # the inline scripts in board / admin / msm pages. Restricts where data can be
    # exfiltrated to if anything ever does get injected.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://baseball.exposureevents.com; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://www.google.com https://maps.google.com https://baseball.exposureevents.com; connect-src 'self' https://www.google-analytics.com https://generativelanguage.googleapis.com https://baseball.exposureevents.com; object-src 'none'; base-uri 'self'; form-action 'self'"

# CSS and JS: we don't content-hash filenames, so allow revalidation on every
# visit. max-age=0 + must-revalidate keeps the file cached but always checked
# against ETag — usually a 304 with zero bytes transferred when unchanged.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Logos and brand images: safe to cache aggressively (filenames are stable).
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
