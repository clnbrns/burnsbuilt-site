# Netlify configuration for BurnsBuilt.co
# Static site + Netlify Functions for AI Lead Qualifier.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  # Bundler for AI functions (uses twilio + @netlify/blobs; Gemini called via fetch)
  node_bundler = "esbuild"
  # External dependencies are resolved from package.json node_modules
  external_node_modules = ["twilio", "@netlify/blobs"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# CSS and JS: we don't content-hash filenames, so allow revalidation on every
# visit. max-age=0 + must-revalidate keeps the file cached but always checked
# against ETag — usually a 304 with zero bytes transferred when unchanged.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Logos and brand images: safe to cache aggressively (filenames are stable).
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
