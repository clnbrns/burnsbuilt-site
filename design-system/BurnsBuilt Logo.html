<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BurnsBuilt — Twin Block Identity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --navy:     #142640;
    --navy-2:   #1e3a5f;
    --steel:    #3d5a80;
    --tan:      #d9b382;
    --tan-2:    #c49a62;
    --tan-3:    #b88850;
    --tan-soft: #ead9be;
    --cream:    #f5ece0;
    --paper:    #fbf7f0;
    --ink:      #0e1a2e;
  }
  html, body { margin:0; padding:0; background:#f0eee9; font-family: 'Inter', system-ui, sans-serif; color:#0e1a2e; }

  /* ——— surfaces ——— */
  .surf-cream { background: var(--cream); }
  .surf-paper { background: var(--paper); }
  .surf-navy  { background: var(--navy); color: var(--cream); }
  .surf-tan   { background: var(--tan-soft); }
  .surf-white { background: #fff; }

  .artboard-pad{
    width:100%; height:100%; box-sizing:border-box;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    padding: 40px; position:relative;
  }
  .ab-caption{
    position:absolute; left:20px; bottom:14px;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing:0.08em; text-transform:uppercase;
    opacity:0.55;
  }

  /* ——————————————————————— CORE MARK ——————————————————————— */
  /* Parametric: pass --size (block height), --gap, --father, --son, --letter */
  .bbmark{
    --size: 72px;
    --gap: 6px;
    --father: var(--navy);
    --son: var(--tan-2);
    --letter: var(--cream);
    --letter-son: var(--navy);
    display:inline-grid;
    grid-template-columns: var(--size) var(--size);
    gap: var(--gap);
    width: calc(var(--size) * 2 + var(--gap));
    height: var(--size);
  }
  .bbmark .blk{
    position:relative; border-radius: calc(var(--size) * 0.06);
    display:grid; place-items:center;
    overflow:hidden;
  }
  .bbmark .blk.father{ background: var(--father); }
  .bbmark .blk.son   { background: var(--son); }
  .bbmark .blk span{
    font-family:'Archivo', sans-serif;
    font-weight: 800;
    font-size: calc(var(--size) * 0.68);
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--letter);
    transform: translateY(-0.02em);
  }
  .bbmark .blk.son span{ color: var(--letter-son); }
  /* structural "seam" across the block (subtle) */
  .bbmark .blk::after{
    content:""; position:absolute; left:0; right:0; top:50%;
    height:1px; background: rgba(255,255,255,0.15);
    transform: translateY(-0.5px);
    display:none;
  }
  .bbmark.seam .blk::after{ display:block; }
  .bbmark.seam .blk.son::after{ background: rgba(20,38,64,0.15); }

  /* wordmark variants */
  .bb-word{
    font-family:'Archivo', sans-serif;
    font-weight: 800;
    letter-spacing:-0.015em;
    color: var(--navy);
    line-height: 0.95;
  }
  .bb-word .built{ color: var(--tan-3); font-weight:700; }

  .bb-caps{
    font-family:'Archivo', sans-serif;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--navy);
  }
  .bb-caps .bar{
    display:inline-block; width:6px; height:6px; background: var(--tan-2);
    border-radius:50%; margin: 0 8px; transform: translateY(-3px);
  }
  .bb-mono{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing:0.22em; text-transform:uppercase; color: var(--steel);
  }

  /* ——————————— LOCKUPS ——————————— */

  /* A: Primary horizontal */
  .lk-horiz{ display:flex; align-items:center; gap: 20px; }
  .lk-horiz .txt{ display:flex; flex-direction:column; gap:8px; }

  /* B: Stacked — mark centered over wordmark */
  .lk-stack{ display:flex; flex-direction:column; align-items:center; gap:18px; }

  /* C: Inline — mark replaces the BB in "BurnsBuilt" */
  .lk-inline{
    display:flex; align-items:center; gap: 10px;
    font-family:'Archivo', sans-serif; font-weight:800;
    font-size: 42px; letter-spacing:-0.02em; color: var(--navy);
  }
  .lk-inline .u{ color: var(--navy); }
  .lk-inline .t{ color: var(--tan-3); font-weight:700; }

  /* D: Compact badge — mark + caps */
  .lk-badge{ display:flex; flex-direction:column; align-items:center; gap:14px; }

  /* E: Monotone variants — just the mark on different surfaces */

  /* ——————————— ARTBOARD-SPECIFIC ——————————— */

  .primary-hero .bbmark{ --size: 96px; --gap: 8px; }
  .primary-hero .name{ font-size: 52px; }
  .primary-hero .sub{ margin-top: 4px; }

  .stack-ab .bbmark{ --size: 110px; --gap: 10px; }
  .stack-ab .name{ font-size: 42px; }

  .inline-ab .bbmark{
    --size: 44px; --gap: 4px;
    --letter-son: var(--navy);
  }

  .mono-ab .bbmark{ --size: 120px; --gap: 10px; }
  .mono-navy .bbmark{ --father: var(--navy); --son: var(--navy); --letter: var(--cream); --letter-son: var(--cream); }
  .mono-tan  .bbmark{ --father: var(--tan-2); --son: var(--tan-2); --letter: var(--navy); --letter-son: var(--navy); }
  .mono-out  .bbmark{ --father: transparent; --son: transparent; --letter: var(--navy); --letter-son: var(--navy); }
  .mono-out  .bbmark .blk{ box-shadow: inset 0 0 0 2px var(--navy); border-radius: 8px; }

  /* Motion — subtle pulse on the "son" block on hover for the primary hero */
  .primary-hero .bbmark .blk.son{ transition: transform 0.4s cubic-bezier(.2,.7,.3,1); }
  .primary-hero:hover .bbmark .blk.son{ transform: translateX(-4px); }

  /* ——————————— USAGE SURFACES ——————————— */

  /* Business cards */
  .cards-stack{ display:flex; gap:24px; }
  .bcard{
    width: 440px; height: 250px; border-radius: 4px;
    box-shadow: 0 14px 40px rgba(10,20,35,0.14), 0 2px 6px rgba(10,20,35,0.05);
    position:relative; overflow:hidden; box-sizing:border-box;
    padding: 26px 28px;
  }
  .bcard.front{ background: var(--paper); }
  .bcard.front .top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .bcard.front .top .bbmark{ --size: 40px; --gap: 4px; }
  .bcard.front .tag{
    font-family:'JetBrains Mono', monospace;
    font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color: var(--steel);
    text-align:right; line-height:1.6;
  }
  .bcard.front .who{
    position:absolute; left:28px; bottom:28px;
    font-family:'Archivo'; font-weight:700; font-size:16px; color: var(--navy);
    letter-spacing:-0.005em;
  }
  .bcard.front .role{
    position:absolute; left:28px; bottom:12px;
    font-family:'JetBrains Mono', monospace; font-size:10px;
    letter-spacing:0.18em; text-transform:uppercase; color: var(--steel);
  }
  .bcard.front .meta{
    position:absolute; right:28px; bottom:28px; text-align:right;
    font-family:'JetBrains Mono', monospace; font-size:10px; color: var(--steel); line-height:1.7;
  }
  .bcard.front .rule{
    position:absolute; left:28px; right:28px; top:108px; height:1px;
    background: linear-gradient(90deg, var(--navy) 0 40%, var(--tan-2) 40% 100%);
    opacity:0.5;
  }
  .bcard.back{ background: var(--navy); display:grid; place-items:center; }
  .bcard.back .bbmark{ --size: 120px; --gap: 10px;
    --father: var(--cream); --son: var(--tan);
    --letter: var(--navy); --letter-son: var(--navy);
  }
  .bcard.back .corner{
    position:absolute; left:22px; top:22px;
    font-family:'JetBrains Mono', monospace; font-size:9px;
    letter-spacing:0.28em; text-transform:uppercase; color: var(--tan);
  }
  .bcard.back .corner-r{
    position:absolute; right:22px; bottom:22px;
    font-family:'JetBrains Mono', monospace; font-size:9px;
    letter-spacing:0.28em; text-transform:uppercase; color: var(--tan);
  }

  /* Browser */
  .browser{
    width: 720px; height: 440px;
    background:#fff; border-radius: 10px; overflow:hidden;
    box-shadow: 0 18px 50px rgba(10,20,35,0.15), 0 2px 8px rgba(10,20,35,0.08);
    display:flex; flex-direction:column;
  }
  .bbar{
    height: 36px; background:#eceae5; display:flex; align-items:center; padding:0 14px; gap:6px;
    border-bottom:1px solid #e2dfd8;
  }
  .bbar .tl{ width:10px; height:10px; border-radius:50%; background:#e06b5a; }
  .bbar .tl.y{ background:#e6b84a; } .bbar .tl.g{ background:#5ab56b; }
  .bbar .url{
    margin-left:14px; background:#fff; border-radius:5px; padding:4px 10px;
    font-family:'JetBrains Mono', monospace; font-size:11px; color:#6d7684; flex:1;
  }
  .bhead{
    padding: 20px 28px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid #eee;
  }
  .bhead .logo{ display:flex; align-items:center; gap:12px; }
  .bhead .logo .bbmark{ --size: 30px; --gap: 3px; }
  .bhead .logo .name{
    font-family:'Archivo', sans-serif; font-weight:800; font-size:18px; color: var(--navy);
    letter-spacing:-0.015em;
  }
  .bhead .logo .name i{ color: var(--tan-3); font-style:normal; font-weight:700; }
  .bnav{ display:flex; gap:22px; font-family:'Inter'; font-size:13px; color: var(--steel); font-weight:500; }
  .bnav .cta{
    background: var(--navy); color: var(--cream); padding:8px 14px; border-radius:4px;
    font-family:'Archivo'; font-weight:600; font-size:12px; letter-spacing:0.1em; text-transform:uppercase;
  }
  .bbody{
    flex:1; padding: 44px 28px; display:grid; grid-template-columns: 1.25fr 1fr; gap: 28px; align-items:center;
  }
  .bbody h1{
    margin:0 0 14px; font-family:'Archivo', sans-serif; font-weight:800;
    font-size:38px; letter-spacing:-0.025em; color: var(--navy); line-height:1.02;
  }
  .bbody h1 em{ font-style:normal; color: var(--tan-3); }
  .bbody p{
    margin:0; font-family:'Inter'; font-size:14px; color: var(--steel); max-width:420px; line-height:1.55;
  }
  .bbody .chips{ display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    font-family:'JetBrains Mono', monospace; font-size:10px;
    letter-spacing:0.14em; text-transform:uppercase; color: var(--navy);
    padding: 6px 10px; border-radius: 999px; background: #fff; border:1px solid #e2dfd8;
  }
  .chip .dot{ width:5px; height:5px; background: var(--tan-2); border-radius:50%; }
  .bbody .right{ display:flex; justify-content:center; }
  .bbody .right .bbmark{ --size: 96px; --gap: 10px; }

  /* Avatars */
  .avatars{ display:flex; gap:26px; align-items:center; justify-content:center; }
  .av{
    width:128px; height:128px; border-radius: 28px; display:grid; place-items:center;
    box-shadow: 0 8px 24px rgba(10,20,35,0.15); position:relative; overflow:hidden;
  }
  .av .bbmark{ --size: 44px; --gap: 5px; }
  .av.v-navy{ background: var(--navy); }
  .av.v-navy .bbmark{ --father: var(--cream); --son: var(--tan); --letter: var(--navy); --letter-son: var(--navy); }
  .av.v-tan{ background: var(--tan); }
  .av.v-tan .bbmark{ --father: var(--navy); --son: var(--cream); --letter: var(--cream); --letter-son: var(--navy); }
  .av.v-cream{ background: var(--cream); border:1px solid #e5dccc; }
  .av-caption{
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.2em;
    text-transform:uppercase; color: var(--steel); text-align:center; margin-top:12px;
  }

  /* Invoice */
  .invoice{
    width: 480px; height: 580px; background:#fff; padding: 36px;
    box-shadow: 0 18px 50px rgba(10,20,35,0.15); box-sizing:border-box; position:relative;
    font-family:'Inter', sans-serif;
  }
  .inv-top{ display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid #eee; padding-bottom:22px; }
  .inv-top .bbmark{ --size: 38px; --gap: 4px; }
  .inv-top .stamp .l{ font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color: var(--steel); }
  .inv-top .stamp .n{ font-family:'JetBrains Mono', monospace; font-size:13px; color: var(--navy); margin-top:4px; }
  .inv-to{ margin-top:22px; }
  .inv-to .h, .inv-dates .h{ font-family:'JetBrains Mono', monospace; font-size:9.5px; letter-spacing:0.22em; text-transform:uppercase; color: var(--steel); margin-bottom:6px; }
  .inv-to .body{ font-size:13px; color: var(--navy); line-height:1.6; }
  .inv-rows{ margin-top: 22px; border-top:1px solid #eee; }
  .inv-row{ display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f1efe9; font-size:13px; color: var(--navy); }
  .inv-row .desc{ color:#4b586d; }
  .inv-total{ display:flex; justify-content:space-between; margin-top:18px; padding-top:14px; border-top:2px solid var(--navy); font-family:'Archivo'; font-weight:800; color: var(--navy); }
  .inv-foot{ position:absolute; left:36px; bottom:28px; right:36px; display:flex; justify-content:space-between;
    font-family:'JetBrains Mono', monospace; font-size:9.5px; letter-spacing:0.2em; text-transform:uppercase; color: var(--steel); }

  /* Email signature */
  .sig{
    width: 520px; background:#fff; border:1px solid #e6e2d8; padding: 22px 24px; border-radius:4px;
    display:flex; align-items:center; gap:20px;
    box-shadow: 0 4px 14px rgba(10,20,35,0.05);
  }
  .sig .bbmark{ --size: 56px; --gap: 6px; }
  .sig .lines{ font-family:'Inter'; font-size:13px; color: var(--navy); line-height:1.55; flex:1; }
  .sig .lines .n{ font-family:'Archivo'; font-weight:800; font-size:15px; letter-spacing:-0.01em; }
  .sig .lines .r{ font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color: var(--steel); margin-top:2px; }
  .sig .lines .c{ margin-top:8px; color: var(--steel); font-size:12px; }

  /* Sign / van decal */
  .sign{
    width: 420px; height: 210px; background: var(--navy); border-radius: 6px; position:relative;
    display:grid; place-items:center;
    box-shadow: 0 14px 40px rgba(10,20,35,0.25);
    overflow:hidden;
  }
  .sign::before{
    content:""; position:absolute; left:0; right:0; top:0; height:8px; background: var(--tan-2);
  }
  .sign::after{
    content:""; position:absolute; left:0; right:0; bottom:0; height:8px; background: var(--tan-2);
  }
  .sign .bbmark{ --size: 86px; --gap: 8px;
    --father: var(--cream); --son: var(--tan); --letter: var(--navy); --letter-son: var(--navy);
  }
  .sign .tag{
    position:absolute; left:22px; bottom:20px;
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.24em; text-transform:uppercase;
    color: var(--tan);
  }
  .sign .phone{
    position:absolute; right:22px; bottom:20px;
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.14em;
    color: var(--cream);
  }

  /* Brand system artboard */
  .specs{
    width:100%; height:100%; padding: 36px; box-sizing:border-box;
    display:grid; grid-template-columns: 1fr 1fr; gap: 32px;
  }
  .specs h4{
    margin:0 0 14px; font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.24em; text-transform:uppercase; color: var(--steel);
  }
  .color-row{ display:flex; flex-direction:column; gap: 12px; }
  .color-cell{
    display:flex; align-items:center; gap:12px;
    font-family:'JetBrains Mono', monospace; font-size:11px; color: var(--navy);
  }
  .color-cell .chip2{ width:36px; height:36px; border-radius:4px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); }
  .type-row{ display:flex; flex-direction:column; gap:18px; }
  .type-sample .name{ font-family:'JetBrains Mono', monospace; font-size:10px; color: var(--steel); letter-spacing:0.16em; text-transform:uppercase; margin-bottom:4px; }
  .type-sample .s{ color: var(--navy); }

  /* Construction / anatomy artboard */
  .anatomy{
    width:100%; height:100%; padding:36px; box-sizing:border-box;
    display:flex; flex-direction:column; justify-content:center; align-items:center; gap:24px;
    position:relative;
  }
  .anatomy .grid{
    position:relative;
    width: 340px; height: 170px;
  }
  .anatomy .bbmark{ --size: 160px; --gap: 20px; position:absolute; left:0; top:5px; }
  .anatomy .dims{ position:absolute; inset:-20px; pointer-events:none; }
  .anatomy .dims svg{ width:100%; height:100%; overflow:visible; }
  .anatomy .labels{
    display:flex; gap: 40px; margin-top:6px;
    font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:0.2em;
    text-transform:uppercase; color: var(--steel);
  }
  .anatomy .labels .l{ display:flex; align-items:center; gap:8px; }
  .anatomy .labels .l .d{ width:10px; height:10px; border-radius:3px; }

</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="lib/design-canvas.jsx"></script>

<div id="root"></div>

<script type="text/babel" data-presets="react">

const Mark = ({ size=72, gap=6, className='', style={} }) => (
  <div className={`bbmark ${className}`} style={{ '--size': size+'px', '--gap': gap+'px', ...style }}>
    <div className="blk father"><span>B</span></div>
    <div className="blk son"><span>B</span></div>
  </div>
);

/* ————————————— LOGO LOCKUPS ————————————— */

// Primary — horizontal lockup
const Primary = () => (
  <div className="artboard-pad surf-paper primary-hero">
    <div className="lk-horiz">
      <Mark size={92} gap={8}/>
      <div className="txt">
        <div className="bb-word" style={{fontSize:44}}>Burns<span className="built">Built</span></div>
        <div className="bb-mono" style={{display:'flex', justifyContent:'space-between', width:'100%'}}>
          <span>Fast</span><span>IT</span><span>for</span><span>Local</span><span>Business</span>
        </div>
      </div>
    </div>
    <div className="ab-caption">Primary · Horizontal Lockup</div>
  </div>
);

// Blueprint — Twin Block with technical/spec-drawing energy
const Blueprint = () => (
  <div className="artboard-pad" style={{background:'#eef0ec', overflow:'hidden'}}>
    <div style={{
      position:'absolute', inset:0,
      backgroundImage:'linear-gradient(to right, rgba(20,38,64,0.07) 1px, transparent 1px), linear-gradient(to bottom, rgba(20,38,64,0.07) 1px, transparent 1px)',
      backgroundSize:'16px 16px', pointerEvents:'none'
    }}/>
    <div style={{position:'relative', display:'flex', flexDirection:'column', alignItems:'center', gap:20}}>
      <div style={{position:'relative'}}>
        <Mark size={110} gap={10}/>
        {/* corner ticks */}
        <svg style={{position:'absolute', inset:-14, width:'calc(100% + 28px)', height:'calc(100% + 28px)', overflow:'visible', pointerEvents:'none'}}>
          <g stroke="#142640" strokeWidth="1.2" fill="none">
            <path d="M0 8 L0 0 L8 0"/>
            <path d="M100% 8 L100% 0 L calc(100% - 8) 0" transform="translate(248,0)"/>
          </g>
          <line x1="0" y1="-6" x2="120" y2="-6" stroke="#142640" strokeWidth="1" strokeDasharray="2 3"/>
          <line x1="128" y1="-6" x2="248" y2="-6" stroke="#b88850" strokeWidth="1" strokeDasharray="2 3"/>
          <text x="60" y="-12" fontFamily="JetBrains Mono" fontSize="8.5" fill="#142640" textAnchor="middle" letterSpacing="1.5">FATHER</text>
          <text x="188" y="-12" fontFamily="JetBrains Mono" fontSize="8.5" fill="#b88850" textAnchor="middle" letterSpacing="1.5">SON</text>
        </svg>
      </div>
      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:8, marginTop:12}}>
        <div style={{fontFamily:'Space Grotesk', fontWeight:700, fontSize:28, letterSpacing:'-0.015em', color:'var(--navy)'}}>
          burns<span style={{color:'var(--tan-3)'}}>/</span>built
        </div>
        <div style={{fontFamily:'JetBrains Mono', fontSize:10, letterSpacing:'0.24em', textTransform:'uppercase', color:'var(--steel)'}}>
          Ship in Days · Not Months
        </div>
      </div>
    </div>
    <div className="ab-caption">Blueprint · Technical Lockup</div>
  </div>
);

// Inline — the mark IS the BB in BurnsBuilt
const Inline = () => (
  <div className="artboard-pad surf-white inline-ab">
